<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Education360 · Dashboard Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Figtree', sans-serif;
      background: #060D1B;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #E9B84A;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 32px;
      color: #fff;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      font-family: 'Figtree', sans-serif;
      font-size: 15px;
      color: #fff;
      outline: none;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #E9B84A; }
    input::placeholder { color: rgba(255,255,255,0.2); }
    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #E9B84A, #B8872A);
      border: none;
      border-radius: 10px;
      font-family: 'Figtree', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #06101E;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
    }
    button:hover { opacity: 0.9; }
    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #FCA5A5;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Education360</div>
    <h1>Dashboard Login</h1>
    <div class="error" id="error-msg">Incorrect username or password.</div>
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
    <button onclick="login()">Sign In</button>
  </div>

  <script>
    // If already logged in, go straight to home
    if (sessionStorage.getItem('e360_auth') === 'true') {
      window.location.href = '/dashboard/home.html';
    }

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        if (res.ok) {
          sessionStorage.setItem('e360_auth', 'true');
          window.location.href = '/dashboard/home.html';
        } else {
          errEl.style.display = 'block';
        }
      } catch (e) {
        errEl.textContent = 'Connection error. Please try again.';
        errEl.style.display = 'block';
      }
    }

    document.getElementById('password').addEventListener('keypress', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
